name: SavedPlaces
options:
  bundleIdPrefix: com.savedplaces
  deploymentTarget:
    iOS: "17.0"

configs:
  Release: release

targets:
  SavedPlaces:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: أماكني
        NSLocationWhenInUseUsageDescription: "يحتاج التطبيق موقعك الحالي فقط عند ضغطك على زر الحفظ"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.savedplaces.app
        PRODUCT_NAME: SavedPlaces
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
